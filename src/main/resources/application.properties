# ==========================================
# MediBook Application Configuration
# ==========================================

# Server
server.port=8080
spring.application.name=medibook

# ==========================================
# Database
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/medibook_db
spring.datasource.username=root
spring.datasource.password=Vishal@2004
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# JWT
# ==========================================
jwt.secret=medibook_super_secret_key_2026_very_long_string_min_256_bits
jwt.expiration=86400000

# ==========================================
# Mail (JavaMailSender)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# OAuth2 - Google
# ==========================================
spring.security.oauth2.client.registration.google.client-id=your_google_client_id
spring.security.oauth2.client.registration.google.client-secret=your_google_client_secret
spring.security.oauth2.client.registration.google.scope=email,profile

# ==========================================
# OAuth2 - GitHub
# ==========================================
spring.security.oauth2.client.registration.github.client-id=your_github_client_id
spring.security.oauth2.client.registration.github.client-secret=your_github_client_secret
spring.security.oauth2.client.registration.github.scope=user:email

# ==========================================
# Quartz Scheduler
# ==========================================
spring.quartz.job-store-type=memory
spring.quartz.auto-startup=true

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# Thymeleaf
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html